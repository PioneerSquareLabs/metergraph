name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metergraph
          POSTGRES_PASSWORD: metergraph
          POSTGRES_DB: metergraph_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U metergraph"
          --health-interval 2s --health-timeout 2s --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "server[dev]"
      - run: pytest server/tests -q
        env:
          MG_TEST_DATABASE_URL: postgresql://metergraph:metergraph@localhost:5432/metergraph_test

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metergraph
          POSTGRES_PASSWORD: metergraph
          POSTGRES_DB: metergraph
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U metergraph"
          --health-interval 2s --health-timeout 2s --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e server
      - name: Start server
        run: |
          uvicorn metergraph_server.main:app --port 8787 &
          for i in $(seq 1 30); do curl -sf localhost:8787/healthz && break; sleep 1; done
        env:
          DATABASE_URL: postgresql://metergraph:metergraph@localhost:5432/metergraph
          MG_TOKENS: ci-token
      - name: Seed demo traffic over the wire API
        run: python scripts/seed_demo.py 3
        env:
          MG_URL: http://localhost:8787
          MG_TOKEN: ci-token
      - name: Assert cost-by-function aggregates
        run: |
          body=$(curl -sf -H "Authorization: Bearer ci-token" "localhost:8787/v1/usage?group_by=func")
          echo "$body" | python3 - <<'EOF'
          import json, sys
          items = {i["key"]: i for i in json.load(sys.stdin)["items"]}
          assert "support.classify_ticket" in items, items.keys()
          assert "extraction.parse_receipt" in items, items.keys()
          priced = [i for i in items.values() if i["unpriced_calls"] == 0]
          assert priced and all(i["cost_usd"] > 0 for i in priced), items
          unpriced = items.get("research.summarize_thread")
          assert unpriced and unpriced["unpriced_calls"] == unpriced["calls"], unpriced
          print("e2e OK:", {k: round(v["cost_usd"], 4) for k, v in items.items()})
          EOF
